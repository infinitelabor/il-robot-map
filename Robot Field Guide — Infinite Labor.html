let selectedCat = null, selectedSub = null;

function renderCategories() {
  document.getElementById('cat-list').innerHTML = DATA.map(cat => `
    <div class="cat-item${cat.isAugmenter?' augmenter':''}" id="cat-${cat.id}" style="--cat-color:${cat.color}" onclick="selectCategory('${cat.id}')">
      ${cat.isAugmenter?'<span class="aug-badge">Not strictly robots</span>':''}
      <div class="cat-num">${cat.num}</div>
      <div class="cat-name">${cat.name}<span class="cat-arrow">→</span></div>
      <div class="cat-tagline">${cat.tagline}</div>
      <div class="cat-market" style="color:${cat.color};opacity:0.65;">${cat.market}</div>
    </div>`).join('');
}

function selectCategory(catId) {
  const cat = DATA.find(c=>c.id===catId); if (!cat) return;
  document.querySelectorAll('.cat-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('cat-'+catId).classList.add('selected');
  selectedCat=catId; selectedSub=null;
  const t=document.getElementById('col2-title'); t.textContent=cat.name; t.style.color=cat.color;
  document.getElementById('sub-list').innerHTML=cat.subs.map(sub=>`
    <div class="sub-item" id="sub-${sub.id}" style="--cat-color:${cat.color}" onclick="selectSub('${catId}','${sub.id}')">
      <div class="sub-name">${sub.name}<span class="sub-arrow">→</span></div>
      <div class="sub-desc">${sub.desc}</div>
    </div>`).join('');
  document.getElementById('col2').classList.add('visible');
  document.getElementById('col3').classList.remove('visible');
  document.getElementById('detail-content').innerHTML='';
  updateBreadcrumb(cat.name, null, cat.color);
}

function selectSub(catId, subId) {
  const cat=DATA.find(c=>c.id===catId), sub=cat?.subs.find(s=>s.id===subId); if (!cat||!sub) return;
  document.querySelectorAll('.sub-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('sub-'+subId).classList.add('selected');
  selectedSub=subId;
  renderDetail(cat, sub, sub.companies[0]);
  const col3=document.getElementById('col3');
  col3.style.setProperty('--cat-color', cat.color);
  col3.classList.add('visible');
  updateBreadcrumb(cat.name, sub.name, cat.color);
}

function imgHTML(co, subId, catColor) {
  if (co.img) {
    const path=co.img.includes('Special:FilePath') ? `./images/${subId}/${co.id}.jpg` : `./images/${subId}/${co.id}.jpg`;
    return `<img id="detail-img" src="${co.img}" alt="${co.name}" onload="this.classList.remove('loading')" onerror="imgFallback(this,'${encodeURIComponent(co.name)}','${encodeURIComponent(co.search)}','${subId}','${co.id}')" class="loading">
            <div class="img-gradient"></div>`;
  }
  const q=encodeURIComponent(co.search||co.name+' robot');
  return `<div class="img-placeholder" style="--cat-color:${catColor}">
    <div class="img-placeholder-name">${co.name}</div>
    <a class="img-placeholder-btn" href="https://www.google.com/search?q=${q}&tbm=isch" target="_blank">Find this image →</a>
    <div class="img-placeholder-path">Save as: images/${subId}/${co.id}.jpg</div>
  </div>`;
}

function imgFallback(img, name, search, subId, coId) {
  const wrap=img.parentElement;
  const catColor=document.getElementById('col3').style.getPropertyValue('--cat-color')||'#4A9EFF';
  img.remove();
  const ph=document.createElement('div');
  ph.className='img-placeholder';
  ph.style.setProperty('--cat-color', catColor);
  const q=encodeURIComponent(decodeURIComponent(search));
  ph.innerHTML=`<div class="img-placeholder-name">${decodeURIComponent(name)}</div>
    <a class="img-placeholder-btn" href="https://www.google.com/search?q=${q}&tbm=isch" target="_blank">Find this image →</a>
    <div class="img-placeholder-path">Save as: images/${subId}/${coId}.jpg</div>`;
  wrap.insertBefore(ph, wrap.firstChild);
}

function renderDetail(cat, sub, co) {
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-content">
      <div class="detail-img-wrap">${imgHTML(co, sub.id, cat.color)}</div>
      <div class="company-name-bar" id="company-name-bar">
        <div class="company-name-bar-name" id="company-name-bar-name" style="color:${cat.color}">${co.name}</div>
        <div class="company-name-bar-tag">selected</div>
      </div>
      <div class="detail-body" style="padding-bottom:0;gap:10px;">
        <div>
          <div class="detail-section-label">Key players — select to view</div>
          <div class="detail-companies">${sub.companies.map(c=>`<div class="company-pill${c.id===co.id?' active':''}" onclick="switchCompany('${cat.id}','${sub.id}','${c.id}')" data-company="${c.id}">${c.name}</div>`).join('')}</div>
        </div>
        <div class="detail-stat" style="border-left-color:${cat.color}">
          <div class="detail-stat-label">Key stat</div>
          <div class="detail-stat-value" style="color:${cat.color}" id="company-stat">${co.stat}</div>
        </div>
      </div>
      <div class="detail-header">
        <div class="detail-category-label" style="color:${cat.color}">${cat.name} / ${cat.num}</div>
        <div class="detail-name">${sub.name}</div>
        <div class="detail-desc">${sub.desc}</div>
      </div>
      <div class="detail-body">
        <div><div class="detail-section-label">What to know</div><div class="detail-text">${sub.detail}</div></div>
        <div class="detail-example">
          <div class="detail-example-label">Real-world example</div>
          <div class="detail-example-text">${sub.example}</div>
        </div>
      </div>
    </div>`;
}

function switchCompany(catId, subId, coId) {
  const cat=DATA.find(c=>c.id===catId), sub=cat?.subs.find(s=>s.id===subId), co=sub?.companies.find(c=>c.id===coId);
  if (!co) return;
  document.querySelectorAll('.company-pill').forEach(el=>el.classList.toggle('active', el.dataset.company===coId));
  document.querySelector('.detail-img-wrap').innerHTML=imgHTML(co, subId, cat.color);
  const s=document.getElementById('company-stat'); if (s) s.textContent=co.stat;
  const n=document.getElementById('company-name-bar-name'); if (n) { n.textContent=co.name; n.style.color=cat.color; }
}

function updateBreadcrumb(catName, subName, color) {
  document.getElementById('breadcrumb').innerHTML=subName
    ?`<span class="crumb" style="color:${color}">${catName}</span><span class="sep">›</span><span class="crumb active">${subName}</span>`
    :`<span class="crumb active" style="color:${color}">${catName}</span>`;
}

renderCategories();
</script>
